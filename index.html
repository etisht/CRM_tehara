<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM טהרת המשפחה – מוקד טלפניות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6B4C8B;
      --primary-light: #8B6AAB;
      --primary-dark: #4A3060;
      --accent: #C9A84C;
      --accent-light: #E8CC80;
      --bg: #F9F6F2;
      --bg-card: #FFFFFF;
      --text: #2C2035;
      --text-muted: #6B5B7A;
      --border: #E2D5F0;
      --success: #4CAF80;
      --warning: #F0A500;
      --danger: #E05555;
      --sidebar-w: 260px;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(107,76,139,0.1);
      --shadow-lg: 0 4px 24px rgba(107,76,139,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; font-size: 15px; line-height: 1.7; }

    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%); padding: 20px; }
    .login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
    .login-logo { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 34px; }
    .login-title { font-size: 26px; font-weight: 800; color: var(--primary-dark); margin-bottom: 4px; }
    .login-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    /* FORMS */
    .form-group { margin-bottom: 16px; text-align: right; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; direction: rtl; transition: border-color 0.2s; background: #FAFAFA; color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--primary); background: white; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .calc-display { background: #F0EDF6; border-color: var(--primary-light); color: var(--primary-dark); font-weight: 700; cursor: default; }
    .req { color: var(--danger); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 22px; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.18s; text-decoration: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #B8963E; transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #C04444; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #3A9E6A; }
    .btn-ghost { background: transparent; color: var(--primary); border: 2px solid var(--border); }
    .btn-ghost:hover { border-color: var(--primary); background: rgba(107,76,139,0.05); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .error-msg { background: #FFF0F0; color: var(--danger); border: 1px solid #FFCDD2; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }

    /* APP LAYOUT */
    #app { display: none; min-height: 100vh; }
    .sidebar { position: fixed; top: 0; right: 0; bottom: 0; width: var(--sidebar-w); background: var(--primary-dark); color: white; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; transition: transform 0.3s ease; }
    .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .sidebar-logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .sidebar-title { font-size: 16px; font-weight: 800; line-height: 1.3; }
    .sidebar-org { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .sidebar-user { font-size: 12px; color: rgba(255,255,255,0.55); padding-top: 6px; }
    .sidebar-user span { color: var(--accent-light); font-weight: 600; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-section-title { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; padding: 12px 8px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.72); transition: all 0.18s; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: var(--primary-light); color: white; font-weight: 600; }
    .nav-icon { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
    .main-content { margin-right: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { position: sticky; top: 0; background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 50; box-shadow: 0 1px 8px rgba(107,76,139,0.07); }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 19px; font-weight: 700; color: var(--primary-dark); }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .mobile-menu-btn { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--primary); padding: 4px; }
    .page-content { padding: 28px; flex: 1; }

    /* CARDS */
    .card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--primary-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: var(--primary-dark); color: white; padding: 12px 16px; text-align: right; font-size: 13px; font-weight: 600; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    .data-table tr:hover td { background: rgba(107,76,139,0.04); }
    .data-table tr:last-child td { border-bottom: none; }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: white; }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.52); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-wide { max-width: 680px; }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--primary-dark); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* FILTERS */
    .filters-bar { background: white; border-radius: 10px; padding: 14px 20px; margin-bottom: 22px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: var(--shadow); }
    .filter-label { font-weight: 600; color: var(--text-muted); font-size: 14px; }
    .filter-select { padding: 8px 14px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 14px; background: white; cursor: pointer; direction: rtl; }
    .filter-select:focus { outline: none; border-color: var(--primary); }

    /* TOAST */
    .toast-container { position: fixed; bottom: 24px; left: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: var(--primary-dark); color: white; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; max-width: 320px; }
    .toast.success { background: #2E7D32; }
    .toast.error { background: var(--danger); }
    .toast.warning { background: #E65100; }
    @keyframes slideIn { from { transform: translateX(-120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }

    /* TAG */
    .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .tag-primary { background: rgba(107,76,139,0.12); color: var(--primary); }
    .tag-success { background: #E8F5E9; color: #2E7D32; }
    .tag-warning { background: #FFF3E0; color: #E65100; }
    .tag-danger { background: #FFEBEE; color: #C62828; }
    .tag-gray { background: #F0F0F0; color: #555; }
    .tag-blue { background: #E3F2FD; color: #1565C0; }
    .tag-accent { background: rgba(201,168,76,0.18); color: #7A5A00; }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .section-header h2 { font-size: 21px; font-weight: 800; color: var(--primary-dark); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* STATS */
    .stats-row { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-chip { background: white; border-radius: 10px; padding: 12px 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; flex: 1; min-width: 120px; }
    .stat-chip .stat-icon { font-size: 22px; }
    .stat-chip .stat-num { font-size: 22px; font-weight: 800; color: var(--primary-dark); }
    .stat-chip .stat-lbl { font-size: 12px; color: var(--text-muted); }

    /* KPI CHIPS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi-chip { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border-top: 4px solid var(--primary); transition: box-shadow 0.2s; }
    .kpi-chip:hover { box-shadow: var(--shadow-lg); }
    .kpi-chip.success { border-top-color: var(--success); }
    .kpi-chip.warning { border-top-color: var(--warning); }
    .kpi-chip.danger { border-top-color: var(--danger); }
    .kpi-chip.accent { border-top-color: var(--accent); }
    .kpi-icon { font-size: 28px; margin-bottom: 8px; }
    .kpi-num { font-size: 28px; font-weight: 800; color: var(--primary-dark); line-height: 1; margin-bottom: 4px; }
    .kpi-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    /* CLOCK WIDGET */
    .clock-widget { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); border-radius: var(--radius); padding: 36px; text-align: center; color: white; margin-bottom: 20px; }
    .clock-time { font-size: 52px; font-weight: 800; letter-spacing: 2px; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
    .clock-date { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .clock-status { font-size: 15px; color: rgba(255,255,255,0.85); margin-bottom: 20px; min-height: 24px; }
    .session-timer { font-size: 42px; font-weight: 800; color: var(--accent-light); font-variant-numeric: tabular-nums; margin: 12px 0; }
    .clock-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .clock-btn-in { background: var(--success); color: white; border: none; padding: 14px 36px; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .clock-btn-in:hover { background: #3A9E6A; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,128,0.4); }
    .clock-btn-out { background: var(--danger); color: white; border: none; padding: 14px 36px; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .clock-btn-out:hover { background: #C04444; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224,85,85,0.4); }

    /* ATTENDANCE SUMMARY */
    .att-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .att-cell { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid var(--primary); }
    .att-cell.vacation { border-top-color: var(--accent); }
    .att-cell.sick { border-top-color: var(--danger); }
    .att-cell.holiday { border-top-color: #42A5F5; }
    .att-cell-num { font-size: 30px; font-weight: 800; color: var(--primary-dark); }
    .att-cell-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ABSENCE CHIP */
    .absence-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px; }
    .absence-vacation { background: rgba(201,168,76,0.15); color: #7A5A00; }
    .absence-sick { background: #FFEBEE; color: #C62828; }
    .absence-holiday { background: #E3F2FD; color: #1565C0; }

    /* DONATION BADGES */
    .donation-number-badge { background: rgba(107,76,139,0.1); color: var(--primary-dark); padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; font-family: monospace; }
    .donor-new { background: #E8F5E9; color: #2E7D32; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .donor-returning { background: #E3F2FD; color: #1565C0; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .method-badge { background: #F0F0F0; color: #555; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }

    /* CHART */
    .chart-container { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
    .chart-title { font-size: 15px; font-weight: 700; color: var(--primary-dark); margin-bottom: 16px; }
    .chart-canvas-wrap { position: relative; height: 240px; }

    /* OVERLAY */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .sidebar-overlay.open { display: block; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { transform: translateX(100%); width: 280px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-right: 0; }
      .mobile-menu-btn { display: block; }
      .page-content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .modal { padding: 22px 18px; }
      .login-box { padding: 36px 24px; }
      .form-row { grid-template-columns: 1fr; }
      .clock-time { font-size: 36px; }
      .session-timer { font-size: 32px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌸</div>
    <div class="login-title">טהרת המשפחה</div>
    <div class="login-sub">מערכת ניהול מוקד טלפניות</div>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>דואר אלקטרוני</label>
      <input class="form-control" type="email" id="login-email" placeholder="name@example.com" dir="ltr" autocomplete="email">
    </div>
    <div class="form-group">
      <label>סיסמא</label>
      <input class="form-control" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="login-btn">כניסה למערכת</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🌸</div>
        <div>
          <div class="sidebar-title">מוקד טלפניות</div>
          <div class="sidebar-org">טהרת המשפחה</div>
        </div>
      </div>
      <div class="sidebar-user">מחובר: <span id="sidebar-username">—</span></div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-full btn-sm" onclick="doLogout()">🚪 התנתקות</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
        <div class="topbar-title" id="topbar-title">—</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- ===== MODALS ===== -->

<!-- Modal: Add / Edit Absence -->
<div class="modal-backdrop" id="modal-absence">
  <div class="modal">
    <div class="modal-title">📅 <span id="absence-modal-title">הוספת היעדרות</span></div>
    <input type="hidden" id="absence-edit-id">
    <div class="form-group" id="absence-operator-row">
      <label>טלפנית <span class="req">*</span></label>
      <select class="form-control" id="absence-operator-id"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>סוג <span class="req">*</span></label>
        <select class="form-control" id="absence-type">
          <option value="vacation">חופשה 🏖️</option>
          <option value="sick">מחלה 🤒</option>
          <option value="holiday">חג 🕍</option>
        </select>
      </div>
      <div class="form-group">
        <label>תאריך <span class="req">*</span></label>
        <input class="form-control" type="date" id="absence-date">
      </div>
    </div>
    <div class="form-group">
      <label>הערה</label>
      <input class="form-control" type="text" id="absence-note" placeholder="הערה אופציונלית">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-absence')">ביטול</button>
      <button class="btn btn-primary" onclick="saveAbsence()">שמירה</button>
    </div>
  </div>
</div>

<!-- Modal: Edit Shift -->
<div class="modal-backdrop" id="modal-shift">
  <div class="modal">
    <div class="modal-title">✏️ עריכת משמרת</div>
    <input type="hidden" id="shift-edit-id">
    <div class="form-group">
      <label>תאריך <span class="req">*</span></label>
      <input class="form-control" type="date" id="shift-date" oninput="updateShiftDuration()">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>שעת כניסה <span class="req">*</span></label>
        <input class="form-control" type="time" id="shift-clock-in" oninput="updateShiftDuration()">
      </div>
      <div class="form-group">
        <label>שעת יציאה</label>
        <input class="form-control" type="time" id="shift-clock-out" oninput="updateShiftDuration()">
      </div>
    </div>
    <div class="form-group">
      <label>משך מחושב</label>
      <input class="form-control calc-display" type="text" id="shift-duration" readonly>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-shift')">ביטול</button>
      <button class="btn btn-primary" onclick="saveShift()">💾 שמירה</button>
    </div>
  </div>
</div>

<!-- Modal: Add/Edit Donation -->
<div class="modal-backdrop" id="modal-donation">
  <div class="modal modal-wide">
    <div class="modal-title">💙 <span id="donation-modal-title">הוספת תרומה</span></div>
    <input type="hidden" id="donation-edit-id">
    <div class="form-group" id="don-operator-row" style="display:none">
      <label>טלפנית <span class="req">*</span></label>
      <select class="form-control" id="don-operator"></select>
    </div>
    <div class="form-group">
      <label>מספר תרומה <span class="req">*</span></label>
      <input class="form-control" type="text" id="don-number" placeholder="הזן מספר תרומה">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>שם התורם <span class="req">*</span></label>
        <input class="form-control" type="text" id="don-donor-name" placeholder="ישראל ישראלי">
      </div>
      <div class="form-group">
        <label>טלפון</label>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {

  authDomain: "hanzaha-d558c.firebaseapp.com",

  projectId: "hanzaha-d558c",
  storageBucket: "hanzaha-d558c.firebasestorage.app",
  messagingSenderId: "531850308489",
  appId: "1:531850308489:web:5e4321be006e223b7ccf58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== STATE =====
// currentUser = { uid: dbKey, email, displayName, role, isActive, ... }

let userProfile = null;      // alias to currentUser for convenience

// ===== HELPERS =====
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtCurrency(n) { return '₪' + Number(n||0).toLocaleString('he-IL', {minimumFractionDigits:0}); }
function fmtDate(ts) { if(!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('he-IL'); }
function fmtDateStr(s) { if(!s) return '—'; const [y,m,dd]=s.split('-'); return `${dd}/${m}/${y}`; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function currentMonth() { return new Date().toISOString().slice(0,7); }
function monthLabel(m) {
  if(!m) return '';
  const [y,mo] = m.split('-');
  const names = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${names[parseInt(mo)]} ${y}`;
}
function fmtDuration(minutes) {
  const h = Math.floor(minutes/60), m = minutes%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function methodLabel(m) {
  return {credit:'אשראי 💳', cash:'מזומן 💵', check:"צ'ק 📋", transfer:'העברה בנקאית 🏦'}[m]||m;
}
function absenceTypeLabel(t) {

}

// Toast
function showToast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Modal
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Sidebar
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

// ===== AUTH (Custom DB-based) =====
// On page load: restore session from localStorage
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('crm_session');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      userProfile = currentUser;
      startApp();
      return;
    } catch(e) { localStorage.removeItem('crm_session'); }
  }
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  hideLoginError();
  if (!email || !pass) { showLoginError('נא למלא אימייל וסיסמא'); return; }
  btn.disabled = true; btn.textContent = 'מתחבר...';
  try {
    // Query all users, find by email
    const snap = await db.ref('users').once('value');
    const users = snap.val() || {};
    let found = null;
    for (const [uid, u] of Object.entries(users)) {
      if ((u.email||'').toLowerCase() === email) { found = { uid, ...u }; break; }
    }
    if (!found) { showLoginError('אימייל או סיסמא שגויים'); btn.disabled=false; btn.textContent='כניסה למערכת'; return; }
    if (found.password !== pass) { showLoginError('אימייל או סיסמא שגויים'); btn.disabled=false; btn.textContent='כניסה למערכת'; return; }
    if (found.isActive === false) { showLoginError('החשבון אינו פעיל. אנא פנה למנהל.'); btn.disabled=false; btn.textContent='כניסה למערכת'; return; }
    currentUser = found;
    userProfile = found;
    localStorage.setItem('crm_session', JSON.stringify(found));
    startApp();
  } catch(e) {
    showLoginError('שגיאה בהתחברות. נסה שוב.');
    btn.disabled = false; btn.textContent = 'כניסה למערכת';
  }
}

function doLogout() {
  if (sessionTimerInterval) { clearInterval(sessionTimerInterval); sessionTimerInterval = null; }
  if (window._clockInterval) { clearInterval(window._clockInterval); window._clockInterval = null; }
  localStorage.removeItem('crm_session');
  currentUser = null; userProfile = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

function showLoginError(msg) { const e=document.getElementById('login-error'); e.textContent=msg; e.style.display='block'; }
function hideLoginError() { document.getElementById('login-error').style.display='none'; }

// ===== APP START =====
async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sidebar-username').textContent = currentUser.displayName || currentUser.email;

  // Load operators & settings into cache
  await Promise.all([loadAllOperators(), loadSettings()]);

  buildNav();

  // Check for open attendance session
  await checkOpenSession();

  // Default page
  if (userProfile.role === 'admin') showPage('admin-dashboard');
  else showPage('operator-dashboard');
}

async function loadAllOperators() {
  const snap = await db.ref('users').once('value');
  allOperators = snap.val() || {};
}

async function loadSettings() {
  const [campSnap, expSnap] = await Promise.all([
    db.ref('settings/campaigns').once('value'),
    db.ref('settings/expenseTypes').once('value')
  ]);
  allCampaigns = campSnap.val() || {};
  allExpenseTypes = expSnap.val() || {};
}

async function checkOpenSession() {
  const snap = await db.ref('attendance')
    .orderByChild('operatorId').equalTo(currentUser.uid).once('value');
  if (!snap.val()) return;
  Object.entries(snap.val()).forEach(([k,v]) => {
    if (!v.clockOut) { openAttendanceKey = k; openAttendanceClockIn = v.clockIn; }
  });
}

function buildNav() {

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-actions').innerHTML = actionsHTML||'';
  document.getElementById('page-content').innerHTML = contentHTML;

// ===== OPERATOR DASHBOARD =====
async function renderOperatorDashboard() {
  const month = currentMonth();
  const [attSnap, absSnap, donSnap] = await Promise.all([
    db.ref('attendance').orderByChild('operatorId').equalTo(currentUser.uid).once('value'),
    db.ref('absences').orderByChild('operatorId').equalTo(currentUser.uid).once('value'),
    db.ref('donations').orderByChild('operatorId').equalTo(currentUser.uid).once('value')
  ]);

  const attData = Object.values(attSnap.val()||{}).filter(r=>r.month===month&&r.clockOut);
  const totalMins = attData.reduce((s,r)=>s+(r.durationMinutes||0),0);

  setPage('דשבורד אישי', '', `

      ${sessionHtml}
      <div class="kpi-chip">

        <div class="kpi-label">שעות עבודה החודש</div>

        <div class="kpi-icon">💙</div>
        <div class="kpi-num">${donData.length}</div>
        <div class="kpi-label">תרומות החודש</div>
      </div>
      <div class="kpi-chip accent">
        <div class="kpi-icon">💰</div>
        <div class="kpi-num">${fmtCurrency(donTotal)}</div>
        <div class="kpi-label">סה"כ תרומות החודש</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📅 סיכום חודש ${monthLabel(month)}</div>
      <div class="att-summary-grid">
        <div class="att-cell"><div class="att-cell-num">${fmtDuration(totalMins)}</div><div class="att-cell-lbl">שעות עבודה</div></div>
        <div class="att-cell vacation"><div class="att-cell-num">${vacDays}</div><div class="att-cell-lbl">ימי חופשה</div></div>
        <div class="att-cell sick"><div class="att-cell-num">${sickDays}</div><div class="att-cell-lbl">ימי מחלה</div></div>
        <div class="att-cell holiday"><div class="att-cell-num">${holDays}</div><div class="att-cell-lbl">ימי חג</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🕐 פעולות מהירות</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">

async function isMonthApproved(uid, month) {
  const snap = await db.ref(`monthApprovals/${uid}/${month.replace('-','_')}`).once('value');
  return !!snap.val();
}

async function buildAttendanceHtml(uid, month, isAdminView = false) {
  const [attSnap, absSnap, approvedSnap] = await Promise.all([
    db.ref('attendance').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref('absences').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref(`monthApprovals/${uid}/${month.replace('-','_')}`).once('value')
  ]);
  const attSortDir = window._attSortDir || 'asc';
  const attData = Object.entries(attSnap.val()||{}).filter(([,r])=>r.month===month)
    .sort((a,b) => attSortDir === 'asc' ? a[1].clockIn - b[1].clockIn : b[1].clockIn - a[1].clockIn);
  const absData = Object.entries(absSnap.val()||{}).filter(([,r])=>r.month===month);
  const totalMins = attData.filter(([,r])=>r.clockOut).reduce((s,[,r])=>s+(r.durationMinutes||0),0);
  const vacDays = absData.filter(([,r])=>r.type==='vacation').length;
  const sickDays = absData.filter(([,r])=>r.type==='sick').length;
  const holDays = absData.filter(([,r])=>r.type==='holiday').length;

  const approved = !!approvedSnap.val();
  const isAdmin = userProfile.role === 'admin';
  // operator can edit only if month not approved; admin can always edit
  const canEdit = isAdmin || !approved;

  const approvalBanner = approved
    ? `<div style="background:#E8F5E9;border:2px solid var(--success);border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <span style="font-weight:700;color:#2E7D32">✅ דוח חודש ${monthLabel(month)} אושר</span>
        ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="unapproveMonth('${uid}','${month}')">ביטול אישור</button>` : ''}
       </div>`
    : isAdmin
      ? `<div style="background:#FFF8E1;border:2px solid var(--warning);border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <span style="color:#E65100;font-weight:600">⏳ דוח טרם אושר</span>
          <button class="btn btn-success btn-sm" onclick="approveMonth('${uid}','${month}')">✅ אישור דוח</button>
         </div>`
      : `<div style="background:#FFF8E1;border:2px solid var(--warning);border-radius:10px;padding:12px 18px;margin-bottom:16px;">
          <span style="color:#E65100;font-weight:600">⏳ הדוח עדיין פתוח לעריכה</span>
         </div>`;

  const shiftRows = attData.map(([k,r]) => {
    const dur = r.clockOut ? fmtDuration(r.durationMinutes||0) : '<span class="tag tag-success">פעיל כעת</span>';
    const actions = canEdit
      ? `<td style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="openEditShift('${k}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteShift('${k}','${uid}','${month}')">🗑️</button>
         </td>`
      : `<td><span class="tag tag-gray" style="font-size:11px">🔒 נעול</span></td>`;
    return `<tr>
      <td>${fmtDateStr(r.date)}</td>
      <td dir="ltr">${new Date(r.clockIn).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</td>
      <td dir="ltr">${r.clockOut ? new Date(r.clockOut).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
      <td>${dur}</td>
      ${actions}
    </tr>`;
  }).join('');

  const absRows = absData.map(([k,r]) => {
    const actions = canEdit
      ? `<td style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="openEditAbsence('${k}','${uid}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAbsence('${k}')">🗑️</button>
         </td>`
      : `<td><span class="tag tag-gray" style="font-size:11px">🔒 נעול</span></td>`;
    return `<tr>
      <td>${fmtDateStr(r.date)}</td>
      <td><span class="absence-chip absence-${r.type}">${absenceTypeLabel(r.type)}</span></td>
      <td>${esc(r.note||'—')}</td>
      ${actions}
    </tr>`;
  }).join('');

  const clockWidget = !isAdminView ? `
    <div class="clock-widget">
      <div class="clock-time" id="live-clock">--:--:--</div>
      <div class="clock-date" id="live-date"></div>
      <div class="clock-status" id="clock-status"></div>
      <div class="session-timer" id="session-timer" style="display:none"></div>
      <div class="clock-actions">
        <button class="clock-btn-in" id="btn-clock-in" onclick="clockIn()">✅ כניסה</button>
        <button class="clock-btn-out" id="btn-clock-out" onclick="clockOut()" style="display:none">🚪 יציאה</button>
      </div>
    </div>` : '';

  return `
    ${clockWidget}
    ${approvalBanner}
    <div class="card">
      <div class="card-title">📊 סיכום חודש ${monthLabel(month)}</div>
      <div class="att-summary-grid">
        <div class="att-cell"><div class="att-cell-num">${fmtDuration(totalMins)}</div><div class="att-cell-lbl">שעות עבודה</div></div>
        <div class="att-cell vacation"><div class="att-cell-num">${vacDays}</div><div class="att-cell-lbl">ימי חופשה</div></div>
        <div class="att-cell sick"><div class="att-cell-num">${sickDays}</div><div class="att-cell-lbl">ימי מחלה</div></div>
        <div class="att-cell holiday"><div class="att-cell-num">${holDays}</div><div class="att-cell-lbl">ימי חג</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="justify-content:space-between">
        <span>📋 יומן משמרות</span>
        <div style="display:flex;gap:8px;align-items:center;">
          ${canEdit ? `<button class="btn btn-primary btn-sm" onclick="openAddShift('${uid}','${month}')">➕ הוספת משמרת</button>` : ''}
        </div>
      </div>
      ${attData.length ? `<div class="table-wrap"><table class="data-table">
        <thead><tr>
          <th style="cursor:pointer;user-select:none" onclick="toggleAttSort('${uid}','${month}',${isAdminView})">
            תאריך ושעה ${ (window._attSortDir||'asc') === 'asc' ? '↑' : '↓'}
          </th>
          <th>כניסה</th><th>יציאה</th><th>משך</th><th>פעולות</th>
        </tr></thead>
        <tbody>${shiftRows}</tbody>
      </table></div>` : `<div style="color:var(--text-muted);font-size:14px">אין משמרות מוזנות</div>`}
    </div>
    ${absData.length || canEdit ? `<div class="card">
      <div class="card-title" style="justify-content:space-between">
        <span>📅 ימי היעדרות</span>
        ${canEdit ? `<button class="btn btn-accent btn-sm" onclick="openAddAbsenceFor('${uid}')">➕ הוספה</button>` : ''}
      </div>
      ${absData.length ? `<div class="table-wrap"><table class="data-table">
        <thead><tr><th>תאריך</th><th>סוג</th><th>הערה</th><th>פעולות</th></tr></thead>
        <tbody>${absRows}</tbody>
      </table></div>` : '<div style="color:var(--text-muted);font-size:14px">אין ימי היעדרות</div>'}
    </div>` : ''}
  `;
}

function startLiveClock() {
  function tick() {
    const el = document.getElementById('live-clock');
    const del = document.getElementById('live-date');
    if (!el) return;
    const now = new Date();
    el.textContent = now.toLocaleTimeString('he-IL');
    if (del) del.textContent = now.toLocaleDateString('he-IL', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
  tick();
  if (!window._clockInterval) window._clockInterval = setInterval(tick, 1000);
}

function updateClockUI() {
  const btnIn = document.getElementById('btn-clock-in');
  const btnOut = document.getElementById('btn-clock-out');
  const timer = document.getElementById('session-timer');
  const status = document.getElementById('clock-status');
  if (!btnIn) return;
  if (openAttendanceKey) {
    btnIn.style.display = 'none'; btnOut.style.display = ''; timer.style.display = '';
    if (status) status.textContent = `במשמרת מאז ${new Date(openAttendanceClockIn).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;
  } else {
    btnIn.style.display = ''; btnOut.style.display = 'none'; timer.style.display = 'none';
    if (status) status.textContent = 'לחץ להתחלת משמרת';
  }
}

function startSessionTimer() {
  if (sessionTimerInterval) clearInterval(sessionTimerInterval);
  sessionTimerInterval = setInterval(() => {
    const el = document.getElementById('session-timer');
    if (!el) { clearInterval(sessionTimerInterval); return; }
    const elapsed = Math.floor((Date.now() - openAttendanceClockIn) / 60000);
    el.textContent = fmtDuration(elapsed);
  }, 10000);
  // update immediately
  const el = document.getElementById('session-timer');
  if (el) el.textContent = fmtDuration(Math.floor((Date.now()-openAttendanceClockIn)/60000));
}

async function clockIn() {
  if (openAttendanceKey) { showToast('כבר במשמרת פעילה','warning'); return; }
  const now = Date.now();
  const record = { operatorId: currentUser.uid, operatorName: userProfile.displayName, clockIn: now, clockOut: null, date: todayStr(), month: currentMonth(), durationMinutes: 0 };
  const ref = await db.ref('attendance').push(record);
  openAttendanceKey = ref.key; openAttendanceClockIn = now;
  showToast('✅ נרשמה כניסה', 'success');
  updateClockUI(); startSessionTimer();
}

async function clockOut() {
  if (!openAttendanceKey) { showToast('אין משמרת פעילה','warning'); return; }
  const now = Date.now();
  const durationMinutes = Math.round((now - openAttendanceClockIn) / 60000);
  await db.ref('attendance/' + openAttendanceKey).update({ clockOut: now, durationMinutes });
  openAttendanceKey = null; openAttendanceClockIn = null;
  if (sessionTimerInterval) { clearInterval(sessionTimerInterval); sessionTimerInterval = null; }
  showToast('🚪 נרשמה יציאה. משך: ' + fmtDuration(durationMinutes), 'success');
  renderAttendancePage();
}

      <span class="filter-label">טלפנית:</span>
      <select class="filter-select" id="att-admin-operator" onchange="loadAdminAttendance()">
        <option value="">כל הטלפניות</option>
        ${operatorOptions}
      </select>
      <span class="filter-label">חודש:</span>
      <input type="month" class="filter-select" id="att-admin-month" value="${currentMonth()}" onchange="loadAdminAttendance()">
    </div>
    <div id="admin-att-content"></div>

async function loadAdminAttendance() {
  const uid = document.getElementById('att-admin-operator')?.value;
  const month = document.getElementById('att-admin-month')?.value || currentMonth();
  const el = document.getElementById('admin-att-content');
  if (!el) return;

  if (uid) {
    el.innerHTML = await buildAttendanceHtml(uid, month, true);
  } else {
    // Show summary for all operators
    const operators = Object.entries(allOperators).filter(([,p])=>p.role==='operator'&&p.isActive!==false);
    let rows = '';
    for (const [uid, profile] of operators) {
      const [attSnap, absSnap, approvedSnap] = await Promise.all([
        db.ref('attendance').orderByChild('operatorId').equalTo(uid).once('value'),
        db.ref('absences').orderByChild('operatorId').equalTo(uid).once('value'),
        db.ref(`monthApprovals/${uid}/${month.replace('-','_')}`).once('value')
      ]);
      const totalMins = Object.values(attSnap.val()||{}).filter(r=>r.month===month&&r.clockOut).reduce((s,r)=>s+(r.durationMinutes||0),0);
      const absData = Object.values(absSnap.val()||{}).filter(r=>r.month===month);
      const approved = !!approvedSnap.val();
      rows += `<tr>
        <td>${esc(profile.displayName)}</td>
        <td>${fmtDuration(totalMins)}</td>
        <td>${absData.filter(r=>r.type==='vacation').length}</td>
        <td>${absData.filter(r=>r.type==='sick').length}</td>
        <td>${absData.filter(r=>r.type==='holiday').length}</td>
        <td>${approved
          ? `<span class="tag tag-success">✅ מאושר</span>`
          : `<span class="tag tag-warning">⏳ ממתין</span>`}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('att-admin-operator').value='${uid}';loadAdminAttendance()">פרטים</button>
          ${approved
            ? `<button class="btn btn-ghost btn-sm" onclick="unapproveMonth('${uid}','${month}')">ביטול אישור</button>`
            : `<button class="btn btn-success btn-sm" onclick="approveMonth('${uid}','${month}')">אישור</button>`}
        </td>
      </tr>`;
    }
    el.innerHTML = `<div class="table-wrap"><table class="data-table">
      <thead><tr><th>שם טלפנית</th><th>שעות עבודה</th><th>חופשה</th><th>מחלה</th><th>חג</th><th>סטטוס</th><th>פעולות</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">אין נתונים</td></tr>'}</tbody>
    </table></div>`;
  }
}

async function saveAbsence() {

// ===== SHIFT ADD / EDIT =====
// Context stored for saveShift to know which operator/month to refresh
let _shiftContext = { uid: null, month: null };

function openAddShift(uid, month) {
  _shiftContext = { uid, month };
  document.getElementById('shift-edit-id').value = '';
  document.getElementById('shift-date').value = todayStr();
  document.getElementById('shift-clock-in').value = '';
  document.getElementById('shift-clock-out').value = '';
  document.getElementById('shift-duration').value = '—';
  openModal('modal-shift');
}

function openEditShift(id) {
  db.ref('attendance/'+id).once('value').then(snap => {
    const r = snap.val(); if(!r) return;
    _shiftContext = { uid: r.operatorId, month: r.month };
    document.getElementById('shift-edit-id').value = id;
    document.getElementById('shift-date').value = r.date||todayStr();
    document.getElementById('shift-clock-in').value = tsToTime(r.clockIn);
    document.getElementById('shift-clock-out').value = r.clockOut ? tsToTime(r.clockOut) : '';
    updateShiftDuration();
    openModal('modal-shift');
  });
}

function tsToTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function updateShiftDuration() {
  const date = document.getElementById('shift-date').value;
  const inTime = document.getElementById('shift-clock-in').value;
  const outTime = document.getElementById('shift-clock-out').value;
  if (!date || !inTime || !outTime) { document.getElementById('shift-duration').value = '—'; return; }
  const inTs = new Date(`${date}T${inTime}`).getTime();
  const outTs = new Date(`${date}T${outTime}`).getTime();
  const mins = Math.round((outTs - inTs) / 60000);
  document.getElementById('shift-duration').value = mins > 0 ? fmtDuration(mins) + ` (${mins} דקות)` : 'שגוי';
}

async function saveShift() {
  const editId = document.getElementById('shift-edit-id').value;
  const date = document.getElementById('shift-date').value;
  const inTime = document.getElementById('shift-clock-in').value;
  const outTime = document.getElementById('shift-clock-out').value;
  if (!date || !inTime) { showToast('נא למלא תאריך ושעת כניסה','error'); return; }

  const clockIn = new Date(`${date}T${inTime}`).getTime();
  const clockOut = outTime ? new Date(`${date}T${outTime}`).getTime() : null;
  const durationMinutes = clockOut ? Math.round((clockOut - clockIn) / 60000) : 0;

  if (clockOut && durationMinutes <= 0) { showToast('שעת יציאה חייבת להיות אחרי כניסה','error'); return; }

  const month = date.slice(0,7);
  const uid = _shiftContext.uid || currentUser.uid;

  if (editId) {
    await db.ref('attendance/'+editId).update({ date, month, clockIn, clockOut, durationMinutes, updatedAt: Date.now() });
    showToast('✅ משמרת עודכנה','success');
  } else {
    await db.ref('attendance').push({
      operatorId: uid,
      operatorName: allOperators[uid]?.displayName || userProfile.displayName,
      date, month, clockIn, clockOut, durationMinutes,
      retroactive: true,
      createdAt: Date.now()
    });
    showToast('✅ משמרת נוספה','success');
  }

  closeModal('modal-shift');
  refreshAttendanceView(uid, month);
}

async function deleteShift(id, uid, month) {
  if (!confirm('למחוק משמרת זו?')) return;
  await db.ref('attendance/'+id).remove();
  showToast('נמחק','success');
  refreshAttendanceView(uid, month);
}

async function unapproveMonth(uid, month) {

  await db.ref(`monthApprovals/${uid}/${month.replace('-','_')}`).remove();
  showToast('אישור בוטל','warning');

}

async function refreshAttendanceView(uid, month) {

const PIE_COLORS = ['#6B4C8B','#C9A84C','#4CAF80','#42A5F5','#E05555','#F0A500','#9B59B6','#00BCD4','#FF7043','#8BC34A','#EC407A','#26A69A'];

function drawPieChart(canvasId, labels, values) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth || 400;
  const legendRows = Math.ceil(labels.length / 2);
  canvas.width = W;
  canvas.height = 260 + legendRows * 26;
  const ctx = canvas.getContext('2d');
  const total = values.reduce((a, b) => a + b, 0);
  if (!total) return;

  const colors = values.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);
  const cx = W / 2;
  const cy = 115;
  const r = Math.min(95, W / 3);

  ctx.clearRect(0, 0, W, canvas.height);

  // Draw slices
  let startAngle = -Math.PI / 2;
  values.forEach((val, i) => {
    const slice = (val / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Percentage label inside slice
    if (slice > 0.22) {
      const midAngle = startAngle + slice / 2;
      const pct = Math.round(val / total * 100);
      const lx = cx + Math.cos(midAngle) * r * 0.62;
      const ly = cy + Math.sin(midAngle) * r * 0.62;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 12px Heebo';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pct + '%', lx, ly);
    }
    startAngle += slice;
  });

  // Center hole (donut effect)
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.42, 0, 2 * Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();

  // Total label in center
  ctx.fillStyle = '#4A3060';
  ctx.font = 'bold 13px Heebo';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('סה"כ', cx, cy - 9);
  ctx.font = 'bold 12px Heebo';
  ctx.fillStyle = '#6B4C8B';
  ctx.fillText(fmtCurrency(total), cx, cy + 9);

  // Legend (2 columns)
  const legTop = cy + r + 18;
  labels.forEach((lbl, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const lx = col === 0 ? 14 : W / 2 + 14;
    const ly = legTop + row * 26;

    // Color dot
    ctx.beginPath();
    ctx.arc(lx + 7, ly + 7, 7, 0, 2 * Math.PI);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // Label text
    ctx.fillStyle = '#2C2035';
    ctx.font = '12px Heebo';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const shortLbl = lbl.length > 11 ? lbl.slice(0, 10) + '…' : lbl;
    ctx.fillText(shortLbl + ' · ' + fmtCurrency(values[i]), lx + 20, ly + 7);
  });
}

// ===== ADMIN USERS =====
async function renderAdminUsersPage() {
  await loadAllOperators();
  const rows = Object.entries(allOperators).map(([uid,p])=>`<tr>
    <td>${esc(p.displayName||'')}</td>
    <td dir="ltr">${esc(p.email||'')}</td>
    <td><span class="tag ${p.role==='admin'?'tag-primary':'tag-success'}">${p.role==='admin'?'מנהל':'טלפנית'}</span></td>
    <td><span class="tag ${p.isActive===false?'tag-danger':'tag-success'}">${p.isActive===false?'לא פעיל':'פעיל'}</span></td>
    <td style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" onclick="openEditUser('${uid}')">✏️ עריכה</button>
      <button class="btn btn-danger btn-sm" onclick="deleteUser('${uid}')">🗑️ מחיקה</button>
    </td>
  </tr>`).join('');

  setPage('ניהול משתמשים', `<button class="btn btn-primary btn-sm" onclick="openAddUser()">➕ משתמש חדש</button>`, `
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>שם</th><th>אימייל</th><th>תפקיד</th><th>סטטוס</th><th>פעולות</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">אין משתמשים</td></tr>'}</tbody>
    </table></div>
  `);
}

function openAddUser() {
  document.getElementById('user-edit-id').value = '';
  document.getElementById('user-modal-title').textContent = 'הוספת משתמש';
  document.getElementById('user-name').value = '';
  document.getElementById('user-email').value = '';
  document.getElementById('user-pass').value = '';
  document.getElementById('user-pass').placeholder = 'לפחות 6 תווים';
  document.getElementById('user-pass-hint').style.display = 'none';
  document.getElementById('user-pass-label').innerHTML = 'סיסמא <span class="req">*</span>';
  document.getElementById('user-role').value = 'operator';
  document.getElementById('user-save-btn').textContent = '✅ יצירה';
  openModal('modal-user');
}

function openEditUser(uid) {
  const p = allOperators[uid];
  if (!p) return;
  document.getElementById('user-edit-id').value = uid;
  document.getElementById('user-modal-title').textContent = 'עריכת משתמש';
  document.getElementById('user-name').value = p.displayName || '';
  document.getElementById('user-email').value = p.email || '';
  document.getElementById('user-pass').value = '';
  document.getElementById('user-pass').placeholder = 'השאר ריק לאי-שינוי';
  document.getElementById('user-pass-hint').style.display = 'block';
  document.getElementById('user-pass-label').innerHTML = 'סיסמא חדשה';
  document.getElementById('user-role').value = p.role || 'operator';
  document.getElementById('user-save-btn').textContent = '💾 שמירה';
  openModal('modal-user');
}

async function saveUser() {
  const editId = document.getElementById('user-edit-id').value;
  const name = document.getElementById('user-name').value.trim();
  const email = document.getElementById('user-email').value.trim().toLowerCase();
  const pass = document.getElementById('user-pass').value;
  const role = document.getElementById('user-role').value;

  if (!name || !email) { showToast('נא למלא שם ואימייל','error'); return; }
  if (!editId && !pass) { showToast('נא להזין סיסמא','error'); return; }
  if (pass && pass.length < 6) { showToast('הסיסמא חייבת להיות לפחות 6 תווים','error'); return; }

  // Check email uniqueness (exclude self when editing)
  const duplicate = Object.entries(allOperators).find(([uid, u]) =>
    (u.email||'').toLowerCase() === email && uid !== editId
  );
  if (duplicate) { showToast('אימייל זה כבר קיים במערכת','error'); return; }

  try {
    if (editId) {
      // Edit existing
      const updates = { displayName: name, email, role };
      if (pass) updates.password = pass;
      await db.ref('users/'+editId).update(updates);
      Object.assign(allOperators[editId], updates);
      // If editing self, update session
      if (editId === currentUser.uid) {
        Object.assign(currentUser, updates);
        localStorage.setItem('crm_session', JSON.stringify(currentUser));
        document.getElementById('sidebar-username').textContent = name;
      }
      showToast('✅ משתמש עודכן','success');
    } else {
      // Create new
      const ref = await db.ref('users').push({
        displayName: name, email, password: pass, role,
        isActive: true, createdAt: Date.now(), createdBy: currentUser.uid
      });
      allOperators[ref.key] = { displayName: name, email, password: pass, role, isActive: true };
      showToast('✅ משתמש נוצר בהצלחה','success');
    }
    closeModal('modal-user');
    renderAdminUsersPage();
  } catch(e) {
    showToast('שגיאה בשמירה','error');
  }
}

async function deleteUser(uid) {
  const p = allOperators[uid];
  if (!p) return;

  // Prevent deleting yourself
  if (uid === currentUser.uid) { showToast('לא ניתן למחוק את המשתמש המחובר','error'); return; }

  // Check for any activity: donations or attendance
  const [donSnap, attSnap, absSnap] = await Promise.all([
    db.ref('donations').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref('attendance').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref('absences').orderByChild('operatorId').equalTo(uid).once('value'),
  ]);

  const hasDonations = !!donSnap.val();
  const hasAttendance = !!attSnap.val();
  const hasAbsences = !!absSnap.val();

  if (hasDonations || hasAttendance || hasAbsences) {
    const details = [
      hasDonations ? 'תרומות' : '',
      hasAttendance ? 'רשומות נוכחות' : '',
      hasAbsences ? 'היעדרויות' : '',
    ].filter(Boolean).join(', ');
    showToast(`לא ניתן למחוק – למשתמש יש ${details} במערכת`, 'error');
    return;
  }

  if (!confirm(`למחוק לצמיתות את ${p.displayName}?`)) return;

  await db.ref('users/'+uid).remove();
  delete allOperators[uid];
  showToast('משתמש נמחק','success');
  renderAdminUsersPage();
}

// ===== SETTINGS =====

  await loadSettings();
  const campRows = Object.entries(allCampaigns).map(([id,c])=>`<tr>
    <td>${esc(c.name)}</td>
    <td><span class="tag ${c.isActive!==false?'tag-success':'tag-danger'}">${c.isActive!==false?'פעיל':'לא פעיל'}</span></td>

      <button class="btn btn-ghost btn-sm" onclick="openEditCampaign('${id}','${esc(c.name)}')">✏️ עריכה</button>
      ${c.isActive!==false ? `<button class="btn btn-danger btn-sm" onclick="deleteCampaign('${id}')">🗑️</button>` : ''}
    </td>
  </tr>`).join('');

  const expTypeRows = Object.entries(allExpenseTypes).map(([id,t])=>`<tr>
    <td>${esc(t.name)}</td>
    <td><span class="tag ${t.isActive!==false?'tag-success':'tag-danger'}">${t.isActive!==false?'פעיל':'לא פעיל'}</span></td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="openEditExpenseType('${id}','${esc(t.name)}')">✏️</button>
      ${t.isActive!==false ? `<button class="btn btn-danger btn-sm" onclick="deleteExpenseType('${id}')">🗑️</button>` : ''}
    </td>
  </tr>`).join('');

  setPage('הגדרות', '', `
    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin:0">📢 ניהול קמפיינים</div>
        <button class="btn btn-primary btn-sm" onclick="openAddCampaign()">➕ קמפיין חדש</button>
      </div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>שם הקמפיין</th><th>סטטוס</th><th>פעולות</th></tr></thead>
        <tbody>${campRows||'<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">אין קמפיינים</td></tr>'}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin:0">🏷️ סוגי הוצאה</div>
        <button class="btn btn-primary btn-sm" onclick="openAddExpenseType()">➕ סוג חדש</button>
      </div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>שם סוג ההוצאה</th><th>סטטוס</th><th>פעולות</th></tr></thead>
        <tbody>${expTypeRows||'<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">אין סוגי הוצאה</td></tr>'}</tbody>
      </table></div>
    </div>
  `);
}

function openAddCampaign() {
  document.getElementById('campaign-edit-id').value='';
  document.getElementById('campaign-name').value='';
  openModal('modal-campaign');
}
function openEditCampaign(id, name) {
  document.getElementById('campaign-edit-id').value=id;
  document.getElementById('campaign-name').value=name;
  openModal('modal-campaign');
}
async function saveCampaign() {
  const id = document.getElementById('campaign-edit-id').value;
  const name = document.getElementById('campaign-name').value.trim();
  if (!name) { showToast('נא להזין שם קמפיין','error'); return; }
  if (id) {
    await db.ref('settings/campaigns/'+id+'/name').set(name);
    allCampaigns[id].name = name;
  } else {
    const ref = await db.ref('settings/campaigns').push({ name, isActive: true });
    allCampaigns[ref.key] = { name, isActive: true };
  }
  closeModal('modal-campaign');
  showToast('✅ קמפיין נשמר','success');
  renderAdminSettingsPage();
}
async function deleteCampaign(id) {
  // Check if in use
  const snap = await db.ref('donations').orderByChild('campaignId').equalTo(id).once('value');
  if (snap.val()) {
    if (!confirm(`לקמפיין זה יש תרומות. לסמן כלא פעיל?`)) return;
    await db.ref('settings/campaigns/'+id+'/isActive').set(false);
    allCampaigns[id].isActive = false;
  } else {
    if (!confirm('למחוק קמפיין זה?')) return;
    await db.ref('settings/campaigns/'+id).remove();
    delete allCampaigns[id];
  }
  showToast('בוצע','success');
  renderAdminSettingsPage();
}

  document.getElementById('exp-type-edit-id').value='';

async function deleteExpenseType(id) {

document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
