async function loadReports() {
  const fromMonth = document.getElementById('rep-from')?.value || currentMonth();
  const toMonth   = document.getElementById('rep-to')?.value   || currentMonth();
  const opFilter  = document.getElementById('rep-operator')?.value || '';
  const el = document.getElementById('reports-content');
  if (!el) return;

  // guard: from <= to
  if (fromMonth > toMonth) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>תאריך ההתחלה חייב להיות לפני תאריך הסיום</h3></div>`;
    return;
  }

  el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)">טוען נתונים…</div>`;

  const months = monthsBetween(fromMonth, toMonth);

  // fetch all data in parallel
  const [donSnap, expSnap, attSnap] = await Promise.all([
    db.ref('donations').once('value'),
    db.ref('expenses').once('value').catch(() => ({ val: () => null })),
    db.ref('attendance').once('value'),
  ]);

  let allDonations = Object.values(donSnap.val()||{}).filter(r => months.includes(r.month));
  let allExpenses  = Object.values(expSnap.val()||{}).filter(r => months.includes(r.month));
  let allAtt       = Object.values(attSnap.val()||{}).filter(r => months.includes(r.month) && r.clockOut);

  if (opFilter) {
    allDonations = allDonations.filter(r => r.operatorId === opFilter);
    allAtt       = allAtt.filter(r => r.operatorId === opFilter);
    // expenses are not per-operator, keep as-is unless single operator selected
  }

  // ---- aggregated KPIs ----
  const totalIncome  = allDonations.reduce((s,r) => s+(r.totalAmount||0), 0);
  const totalExp     = allExpenses.reduce((s,r) => s+(r.amount||0), 0);
  const profitRatio  = totalExp > 0 ? (totalIncome / totalExp).toFixed(1) : '—';
  const donCount     = allDonations.length;
  const totalMins    = allAtt.reduce((s,r) => s+(r.durationMinutes||0), 0);
  const totalHours   = (totalMins / 60).toFixed(1);
  const avgDon       = donCount > 0 ? (totalIncome / donCount) : 0;
  const avgPerHour   = totalMins > 0 ? (totalIncome / (totalMins/60)) : 0;
  const activeOps    = new Set(allDonations.map(r=>r.operatorId)).size;

  // ---- per-month breakdown ----
  const byMonth = {};
  months.forEach(m => { byMonth[m] = { income:0, expenses:0, count:0, mins:0, workers:new Set() }; });
  allDonations.forEach(r => {
    if (byMonth[r.month]) {
      byMonth[r.month].income += r.totalAmount||0;
      byMonth[r.month].count++;
      byMonth[r.month].workers.add(r.operatorId);
    }
  });
  allExpenses.forEach(r => { if (byMonth[r.month]) byMonth[r.month].expenses += r.amount||0; });
  allAtt.forEach(r => { if (byMonth[r.month]) byMonth[r.month].mins += r.durationMinutes||0; });

  // cumulative
  let cumIncome = 0, cumExp = 0;
  const cumIncomeArr = [], cumExpArr = [];
  months.forEach(m => {
    cumIncome += byMonth[m].income; cumExp += byMonth[m].expenses;
    cumIncomeArr.push(cumIncome); cumExpArr.push(cumExp);
  });

  // ---- payment method breakdown per month ----
  const METHODS = ['credit','transfer','check','cash'];
  const METHOD_LABELS = { credit:'אשראי', transfer:'העברה', check:"צ'ק", cash:'מזומן' };
  const METHOD_COLORS = { credit:'#6B4C8B', transfer:'#1976D2', check:'#C9A84C', cash:'#2E7D32' };
  const methodByMonth = {};
  months.forEach(m => { methodByMonth[m] = {credit:0,transfer:0,check:0,cash:0}; });
  allDonations.forEach(r => {
    if (methodByMonth[r.month]) {
      const m = r.paymentMethod||'credit';
      methodByMonth[r.month][m] = (methodByMonth[r.month][m]||0) + (r.totalAmount||0);
    }
  });
  // overall pie
  const methodTotals = {credit:0,transfer:0,check:0,cash:0};
  allDonations.forEach(r => { const m=r.paymentMethod||'credit'; methodTotals[m]=(methodTotals[m]||0)+(r.totalAmount||0); });

  // ---- campaign breakdown ----
  const campTotals = {};
  const campByMonth = {};
  months.forEach(m => { campByMonth[m] = {}; });
  allDonations.forEach(r => {
    const c = r.campaignName||'ללא קמפיין';
    campTotals[c] = (campTotals[c]||0) + (r.totalAmount||0);
    if (campByMonth[r.month]) campByMonth[r.month][c] = (campByMonth[r.month][c]||0) + (r.totalAmount||0);
  });
  const campNames = Object.entries(campTotals).sort((a,b)=>b[1]-a[1]).map(([k])=>k);
  const CAMP_PALETTE = ['#6B4C8B','#1976D2','#2E7D32','#C9A84C','#E53935','#00838F','#6D4C41','#546E7A','#AD1457','#558B2F'];

  // ---- new vs returning vs shimur per month ----
  const newByMonth = {}, retByMonth = {}, shimurByMonth = {};
  months.forEach(m => { newByMonth[m]=0; retByMonth[m]=0; shimurByMonth[m]=0; });
  allDonations.forEach(r => {
    if (!newByMonth.hasOwnProperty(r.month)) return;
    if (r.donorType === 'new') newByMonth[r.month] += r.totalAmount||0;
    else if (r.donorType === 'shimur') shimurByMonth[r.month] += r.totalAmount||0;
    else retByMonth[r.month] += r.totalAmount||0;
  });

  // ---- monthly table rows ----
  const tableRows = months.map(m => {
    const d = byMonth[m];
    const hrs = (d.mins/60).toFixed(1);
    return `<tr>
      <td style="font-weight:700">${monthLabel(m)}</td>
      <td>${d.workers.size}</td>
      <td>${hrs}</td>
      <td>${d.count}</td>
      <td style="font-weight:700;color:var(--success)">${fmtCurrency(d.income)}</td>
      <td style="color:var(--danger)">${fmtCurrency(d.expenses)}</td>
    </tr>`;
  }).join('');

  const periodLabel = fromMonth === toMonth ? monthLabel(fromMonth) : `${monthLabel(fromMonth)} – ${monthLabel(toMonth)}`;

  el.innerHTML = `
    <!-- Title -->
    <div style="text-align:center;font-size:20px;font-weight:800;color:var(--primary-dark);margin:8px 0 20px;">
      תכלול פעילות המוקד – ${periodLabel}
    </div>

    <!-- KPI grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;">
      ${kpiBox('💰','סה"כ הכנסות',fmtCurrency(totalIncome),'var(--success)')}
      ${kpiBox('💸','סה"כ הוצאות',fmtCurrency(totalExp),'var(--danger)')}
      ${kpiBox('📊','יחס רווחיות',profitRatio,'var(--primary)')}
      ${kpiBox('💙','כמות תרומות',donCount,'var(--primary-dark)')}
      ${kpiBox('⏱️','שעות עבודה',totalHours,'var(--accent)')}
      ${kpiBox('📈','ממוצע תרומה',fmtCurrency(avgDon),'#1976D2')}
      ${kpiBox('⚡','ממוצע לשעת עבודה',fmtCurrency(avgPerHour),'#C9A84C')}
      ${kpiBox('👥','טלפניות פעילות',activeOps,'var(--success)')}
    </div>

    <!-- Row 1: income/expense bar + cumulative line -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card" style="padding:16px">
        <div class="chart-title">📊 הוצאות / תרומות חודשי</div>
        <div style="position:relative;height:220px"><canvas id="rch-monthly"></canvas></div>
      </div>
      <div class="card" style="padding:16px">
        <div class="chart-title">📈 גרף מצטבר של תרומות והוצאות</div>
        <div style="position:relative;height:220px"><canvas id="rch-cumulative"></canvas></div>
      </div>
    </div>

    <!-- Row 2: stacked method + pie -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card" style="padding:16px">
        <div class="chart-title">🔀 פילוח מקור התרומות – לפי חודש</div>
        <div style="position:relative;height:220px"><canvas id="rch-method-bar"></canvas></div>
      </div>
      <div class="card" style="padding:16px">
        <div class="chart-title">🥧 פילוח מקור התרומות</div>
        <div style="position:relative;height:220px"><canvas id="rch-method-pie"></canvas></div>
      </div>
    </div>

    <!-- Row 3: new vs returning vs shimur -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card" style="padding:16px">
        <div class="chart-title">🆕 חדשים / חוזרים / שימור – לפי חודש</div>
        <div style="position:relative;height:220px"><canvas id="rch-newret"></canvas></div>
      </div>
      <div class="card" style="padding:16px">
        <div class="chart-title">👥 סיכום לפי טלפנית</div>
        <div style="position:relative;height:220px"><canvas id="rch-operators"></canvas></div>
      </div>
    </div>

    <!-- Row 4: campaign charts -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div class="card" style="padding:16px">
        <div class="chart-title">📢 התפלגות לפי קמפיין – עוגה</div>
        <div style="position:relative;height:260px"><canvas id="rch-camp-pie"></canvas></div>
      </div>
      <div class="card" style="padding:16px">
        <div class="chart-title">📢 התפלגות לפי קמפיין – לפי חודש</div>
        <div style="position:relative;height:260px"><canvas id="rch-camp-bar"></canvas></div>
      </div>
    </div>

    <!-- Monthly table -->
    <div class="card" style="padding:16px;margin-bottom:20px;">
      <div class="chart-title">📋 סיכום חודשי</div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr>
          <th>חודש</th><th>עובדים</th><th>שעות עבודה</th>
          <th>כמות תרומות</th><th>סכום תרומות</th><th>הוצאות</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr style="font-weight:800;background:#F8F4FF;">
          <td>סה"כ</td><td>${activeOps}</td><td>${totalHours}</td>
          <td>${donCount}</td>
          <td style="color:var(--success)">${fmtCurrency(totalIncome)}</td>
          <td style="color:var(--danger)">${fmtCurrency(totalExp)}</td>
        </tr></tfoot>
      </table></div>
    </div>
  `;

  // chart defaults
  Chart.defaults.font.family = 'Heebo, sans-serif';
  Chart.defaults.font.size   = 11;
  const mlabels = months.map(m => monthLabel(m));

  // 1. Monthly grouped bar
  _mkChart('rch-monthly', { type:'bar', data:{
    labels: mlabels,
    datasets:[
      { label:'הכנסות', data: months.map(m=>byMonth[m].income), backgroundColor:'rgba(107,76,139,0.75)', borderRadius:4 },
      { label:'הוצאות', data: months.map(m=>byMonth[m].expenses), backgroundColor:'rgba(229,57,53,0.65)', borderRadius:4 },
    ]
  }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'} }, scales:{ y:{ ticks:{ callback:v=>fmtCurrency(v) } } } } });

  // 2. Cumulative line
  _mkChart('rch-cumulative', { type:'line', data:{
    labels: mlabels,
    datasets:[
      { label:'הכנסות מצטבר', data:cumIncomeArr, borderColor:'#6B4C8B', backgroundColor:'rgba(107,76,139,0.1)', tension:0.3, fill:true },
      { label:'הוצאות מצטבר', data:cumExpArr,   borderColor:'#E53935', backgroundColor:'rgba(229,57,53,0.07)',  tension:0.3, fill:true },
    ]
  }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'} }, scales:{ y:{ ticks:{ callback:v=>fmtCurrency(v) } } } } });

  // 3. Stacked method bar
  _mkChart('rch-method-bar', { type:'bar', data:{
    labels: mlabels,
    datasets: METHODS.map(method=>({
      label: METHOD_LABELS[method],
      data:  months.map(m => methodByMonth[m][method]||0),
      backgroundColor: METHOD_COLORS[method]+'BB',
      borderRadius: 3,
    }))
  }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
    plugins:{ legend:{position:'top'} },
    scales:{ x:{ stacked:true, ticks:{ callback:v=>fmtCurrency(v) } }, y:{ stacked:true } } } });

  // 4. Method pie
  const pieVals = METHODS.map(m=>methodTotals[m]||0);
  if (pieVals.some(v=>v>0)) {
    _mkChart('rch-method-pie', { type:'doughnut', data:{
      labels: METHODS.map(m=>METHOD_LABELS[m]),
      datasets:[{ data:pieVals, backgroundColor:METHODS.map(m=>METHOD_COLORS[m]+'CC'), borderWidth:2 }]
    }, options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'right'}, tooltip:{ callbacks:{ label:ctx => `${ctx.label}: ${fmtCurrency(ctx.raw)} (${totalIncome>0?((ctx.raw/totalIncome)*100).toFixed(1):0}%)` } } } } });
  }

  // 5. New vs returning vs shimur
  _mkChart('rch-newret', { type:'bar', data:{
    labels: mlabels,
    datasets:[
      { label:'חדשים', data:months.map(m=>newByMonth[m]), backgroundColor:'rgba(25,118,210,0.75)', borderRadius:4 },
      { label:'חוזרים', data:months.map(m=>retByMonth[m]), backgroundColor:'rgba(201,168,76,0.75)', borderRadius:4 },
      { label:'שימור', data:months.map(m=>shimurByMonth[m]), backgroundColor:'rgba(230,81,0,0.75)', borderRadius:4 },
    ]
  }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
    plugins:{ legend:{position:'top'} },
    scales:{ x:{ stacked:true, ticks:{ callback:v=>fmtCurrency(v) } }, y:{ stacked:true } } } });

  // 7. Campaign pie
  if (campNames.length) {
    _mkChart('rch-camp-pie', { type:'doughnut', data:{
      labels: campNames,
      datasets:[{ data: campNames.map(c=>campTotals[c]), backgroundColor: campNames.map((_,i)=>CAMP_PALETTE[i%CAMP_PALETTE.length]+'CC'), borderWidth:2 }]
    }, options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'right'}, tooltip:{ callbacks:{ label:ctx=>`${ctx.label}: ${fmtCurrency(ctx.raw)} (${totalIncome>0?((ctx.raw/totalIncome)*100).toFixed(1):0}%)` } } } } });
  }

  // 8. Campaign stacked bar by month
  if (campNames.length) {
    _mkChart('rch-camp-bar', { type:'bar', data:{
      labels: mlabels,
      datasets: campNames.map((c,i)=>({
        label: c,
        data:  months.map(m=>campByMonth[m][c]||0),
        backgroundColor: CAMP_PALETTE[i%CAMP_PALETTE.length]+'BB',
        borderRadius: 3,
      }))
    }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{position:'top'} },
      scales:{ x:{ stacked:true, ticks:{ callback:v=>fmtCurrency(v) } }, y:{ stacked:true } } } });
  }

  // 6. By operator (horizontal bar)
  const byOpArr = Object.entries(
    allDonations.reduce((acc,r)=>{ acc[r.operatorId]=(acc[r.operatorId]||{name:r.operatorName,total:0}); acc[r.operatorId].total+=r.totalAmount||0; return acc; },{})
  ).sort((a,b)=>b[1].total-a[1].total).slice(0,10);
  if (byOpArr.length) {
    _mkChart('rch-operators', { type:'bar', data:{
      labels: byOpArr.map(([,v])=>v.name),
      datasets:[{ label:'סה"כ תרומות', data:byOpArr.map(([,v])=>v.total), backgroundColor:'rgba(107,76,139,0.75)', borderRadius:4 }]
    }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{display:false} },
      scales:{ x:{ ticks:{ callback:v=>fmtCurrency(v) } } } } });
  }
}

function kpiBox(icon, label, value, color) {
  return `<div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 12px;text-align:center;border-top:3px solid ${color};">
    <div style="font-size:22px;margin-bottom:4px;">${icon}</div>
    <div style="font-size:16px;font-weight:800;color:${color};">${value}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${label}</div>
  </div>`;
}

async function exportReportExcel() {
  const fromMonth = document.getElementById('rep-from')?.value || currentMonth();
  const toMonth   = document.getElementById('rep-to')?.value   || currentMonth();
  const opFilter  = document.getElementById('rep-operator')?.value || '';
  const months    = monthsBetween(fromMonth, toMonth);

  const snap = await db.ref('donations').once('value');
  let data = Object.values(snap.val()||{}).filter(r => months.includes(r.month));
  if (opFilter) data = data.filter(r => r.operatorId === opFilter);

  const byOp = {};
  data.forEach(r => {
    if (!byOp[r.operatorId]) byOp[r.operatorId] = { name: r.operatorName, count: 0, total: 0 };
    byOp[r.operatorId].count++; byOp[r.operatorId].total += r.totalAmount||0;
  });

  const wb = XLSX.utils.book_new();
  const sum = [['שם טלפנית','מספר תרומות','סה"כ (₪)']].concat(Object.values(byOp).map(v=>[v.name,v.count,v.total]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sum), 'סיכום');

  const detail = [['מס׳ תרומה','חודש','טלפנית','שם תורם','טלפון','תאריך','סוג','תשלומים','לתשלום','סה"כ','אופן','קמפיין','הערות']].concat(
    data.map(r=>[r.donationNumber, r.month, r.operatorName, r.donorName, r.donorPhone, r.donationDate, r.donorType==='new'?'חדש':r.donorType==='shimur'?'שימור':'חוזר', r.paymentsCount, r.amountPerPayment, r.totalAmount, methodLabel(r.paymentMethod), r.campaignName, r.notes])
  );
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detail), 'פירוט תרומות');
  XLSX.writeFile(wb, `דוח-${fromMonth}-${toMonth}.xlsx`);
  showToast('📥 הקובץ הורד','success');
}

// ===== ADMIN EXPENSES =====
async function renderAdminExpensesPage() {
  setPage('הוצאות מוקד', `<button class="btn btn-primary btn-sm" onclick="openAddExpense()">➕ הוצאה חדשה</button>`, `
    <div class="filters-bar">
      <span class="filter-label">חודש:</span>
      <input type="month" class="filter-select" id="exp-filter-month" value="${currentMonth()}" onchange="loadExpenses()">
    </div>
    <div id="expenses-content"></div>
  `);
  loadExpenses();
}

async function loadExpenses() {
  const month = document.getElementById('exp-filter-month')?.value || currentMonth();
  const snap = await db.ref('expenses').orderByChild('month').equalTo(month).once('value');
  const data = Object.entries(snap.val()||{}).sort((a,b)=>b[1].addedAt-a[1].addedAt);
  const total = data.reduce((s,[,r])=>s+(r.amount||0),0);
  const el = document.getElementById('expenses-content');
  if (!el) return;
  if (!data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">💸</div><h3>אין הוצאות ב${monthLabel(month)}</h3></div>`;
    return;
  }
  const rows = data.map(([k,r])=>`<tr>
    <td>${fmtDateStr(r.expenseDate)}</td>
    <td style="font-weight:700">${fmtCurrency(r.amount)}</td>
    <td>${esc(r.expenseTypeName||'—')}</td>
    <td>${esc(r.description||'—')}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="openEditExpense('${k}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteExpense('${k}')">🗑️</button>
    </td>
  </tr>`).join('');
  el.innerHTML = `
    <div class="stats-row">
      <div class="stat-chip"><span class="stat-icon">💸</span><div><div class="stat-num">${data.length}</div><div class="stat-lbl">הוצאות</div></div></div>
      <div class="stat-chip"><span class="stat-icon">💰</span><div><div class="stat-num">${fmtCurrency(total)}</div><div class="stat-lbl">סה"כ הוצאות</div></div></div>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>תאריך</th><th>סכום</th><th>סוג</th><th>פירוט</th><th>פעולות</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function openAddExpense() {
  document.getElementById('expense-edit-id').value = '';
  document.getElementById('expense-modal-title').textContent = 'הוספת הוצאה';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-date').value = todayStr();
  document.getElementById('exp-desc').value = '';
  populateExpenseTypeDropdown('exp-type');
  openModal('modal-expense');
}

function openEditExpense(id) {
  db.ref('expenses/'+id).once('value').then(snap => {
    const r = snap.val(); if(!r) return;
    document.getElementById('expense-edit-id').value = id;
    document.getElementById('expense-modal-title').textContent = 'עריכת הוצאה';
    document.getElementById('exp-amount').value = r.amount||'';
    document.getElementById('exp-date').value = r.expenseDate||'';
    document.getElementById('exp-desc').value = r.description||'';
    populateExpenseTypeDropdown('exp-type', r.expenseTypeId);
    openModal('modal-expense');
  });
}

function populateExpenseTypeDropdown(selId, selectedId) {
  const sel = document.getElementById(selId);
  sel.innerHTML = '<option value="">-- בחר סוג הוצאה --</option>' +
    Object.entries(allExpenseTypes)
      .filter(([,t])=>t.isActive!==false)
      .map(([id,t])=>`<option value="${id}" ${id===selectedId?'selected':''}>${esc(t.name)}</option>`).join('');
}

async function saveExpense() {
  const editId = document.getElementById('expense-edit-id').value;
  const amount = parseFloat(document.getElementById('exp-amount').value)||0;
  const date = document.getElementById('exp-date').value;
  const typeId = document.getElementById('exp-type').value;
  const desc = document.getElementById('exp-desc').value.trim();
  if (!amount || !date || !typeId) { showToast('נא למלא את כל שדות החובה','error'); return; }
  const typeName = allExpenseTypes[typeId]?.name||'';
  const record = { amount, expenseDate: date, month: date.slice(0,7), expenseTypeId: typeId, expenseTypeName: typeName, description: desc, addedBy: currentUser.uid, addedAt: Date.now() };
  if (editId) await db.ref('expenses/'+editId).update(record);
  else await db.ref('expenses').push(record);
  closeModal('modal-expense');
  showToast('✅ הוצאה נשמרה','success');
  loadExpenses();
}

async function deleteExpense(id) {
  if (!confirm('למחוק הוצאה זו?')) return;
  await db.ref('expenses/'+id).remove();
  showToast('נמחק','success');
  loadExpenses();
}

// ===== ADMIN DASHBOARD =====
async function renderAdminDashboard() {
  const month = window._adminDashMonth || currentMonth();
  const isCurrentMonth = month === currentMonth();
  const today = todayStr();

  await loadAllOperators();
  const operators = Object.entries(allOperators).filter(([,p])=>p.role==='operator'&&p.isActive!==false);

  const horkPromises = operators.map(([uid])=>db.ref(`settings/horkyTargets/${uid}/${month.replace('-','_')}`).once('value'));
  const [donSnap, attSnap, ...horkSnaps] = await Promise.all([
    db.ref('donations').orderByChild('month').equalTo(month).once('value'),
    db.ref('attendance').orderByChild('month').equalTo(month).once('value'),
    ...horkPromises,
  ]);

  // expenses is loaded separately so a permission error doesn't break the whole dashboard
  let expSnap = null;
  try { expSnap = await db.ref('expenses').orderByChild('month').equalTo(month).once('value'); } catch(e) { console.warn('expenses read failed:', e.message); }

  const donations  = Object.values(donSnap.val()||{});
  const expenses   = Object.values(expSnap?.val()||{});
  const attRecords = Object.values(attSnap.val()||{});
  const totalDon   = donations.reduce((s,r)=>s+(r.totalAmount||0),0);
  const totalExp   = expenses.reduce((s,r)=>s+(r.amount||0),0);
  const activeOps  = new Set(donations.map(r=>r.operatorId)).size;

  // hork targets map
  const horkTargets = {};
  operators.forEach(([uid],i)=>{ horkTargets[uid] = horkSnaps[i].val()?.target ?? null; });

  // TODAY
  const todayDons      = donations.filter(r=>r.donationDate===today);
  const todayDonTotal  = todayDons.reduce((s,r)=>s+(r.totalAmount||0),0);
  const todayAtt       = attRecords.filter(r=>r.date===today);
  const todayWorkMins  = todayAtt.filter(r=>r.clockOut).reduce((s,r)=>s+(r.durationMinutes||0),0);
  const todayActiveOps = new Set(todayAtt.map(r=>r.operatorId)).size;

  // per-operator stats
  const byOp = {};
  donations.forEach(r=>{
    if(!byOp[r.operatorId]) byOp[r.operatorId]={total:0,count:0,horkCount:0};
    byOp[r.operatorId].total += r.totalAmount||0;
    byOp[r.operatorId].count++;
    if((r.paymentsCount||0)>6) byOp[r.operatorId].horkCount++;
  });

  // operator cards sorted by total donations desc
  const opCards = operators
    .map(([uid,p])=>({ uid, name:p.displayName||'', ...(byOp[uid]||{total:0,count:0,horkCount:0}), horkTarget:horkTargets[uid] }))
    .sort((a,b)=>b.total-a.total)
    .map(op=>{
      const horkPct = op.horkTarget > 0 ? Math.min(100,Math.round((op.horkCount/op.horkTarget)*100)) : 0;
      const medal   = op === operators.map(([uid,p])=>({ uid, name:p.displayName||'', ...(byOp[uid]||{total:0,count:0,horkCount:0}), horkTarget:horkTargets[uid] })).sort((a,b)=>b.total-a.total)[0] ? '🥇 ' : '';
      return `
        <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;border-top:3px solid var(--primary);">
          <div style="font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;">${medal}${esc(op.name)}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;">
            <div style="text-align:center;background:#F8F4FF;border-radius:6px;padding:6px 4px;">
              <div style="font-size:20px;font-weight:800;color:var(--success);">${op.count}</div>
              <div style="font-size:10px;color:var(--text-muted);">תרומות</div>
            </div>
            <div style="text-align:center;background:#FFF8E7;border-radius:6px;padding:6px 4px;">
              <div style="font-size:14px;font-weight:800;color:var(--accent);">${fmtCurrency(op.total)}</div>
              <div style="font-size:10px;color:var(--text-muted);">סה"כ</div>
            </div>
          </div>
          ${op.horkTarget !== null

async function sendPasswordReset(email) {
  if (!email) { showToast('אין כתובת מייל למשתמש זה','error'); return; }
  if (!confirm(`לשלוח מייל לאיפוס סיסמא לכתובת:\n${email}?`)) return;
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    showToast(`📧 מייל לאיפוס סיסמא נשלח ל-${email}`,'success');
  } catch(e) {
    if (e.code === 'auth/user-not-found') {
      showToast('המשתמש טרם הגדיר Firebase Auth (ממתין להתחברות ראשונה)','error');
    } else {
      showToast('שגיאה בשליחת מייל: ' + e.message,'error');
    }
  }
}

async function saveUser() {
  const editId = document.getElementById('user-edit-id').value;
  const name = document.getElementById('user-name').value.trim();
  const email = document.getElementById('user-email').value.trim().toLowerCase();
  const pass = document.getElementById('user-pass').value;
  const role = document.getElementById('user-role').value;

  if (!name || !email) { showToast('נא למלא שם ואימייל','error'); return; }
  if (!editId && !pass) { showToast('נא להזין סיסמא','error'); return; }
  if (pass && pass.length < 6) { showToast('הסיסמא חייבת להיות לפחות 6 תווים','error'); return; }

  // Check email uniqueness (exclude self when editing)
  const duplicate = Object.entries(allOperators).find(([uid, u]) =>
    (u.email||'').toLowerCase() === email && uid !== editId
  );
  if (duplicate) { showToast('אימייל זה כבר קיים במערכת','error'); return; }

  try {
    if (editId) {
      // ── Edit existing ──
      const updates = { displayName: name, email, role };
      if (pass) {
        if (editId === currentUser.uid) {
          // Changing OWN password → update Firebase Auth directly
          await firebase.auth().currentUser.updatePassword(pass);
          // No need to store password in DB (Firebase Auth is the source of truth)
        } else {
          // Changing ANOTHER user's password:
          // Store hash in DB and clear their authUid so the migration re-runs on next login.
          // If their Firebase Auth account already exists, they may need one session without Auth.
          // Admin tip: delete the user's Firebase Auth account from Firebase Console to fully reset.
          updates.password = await hashPassword(pass);
          updates.authUid  = null;
        }
      }
      await db.ref('users/'+editId).update(updates);
      Object.assign(allOperators[editId], updates);
      if (editId === currentUser.uid) {
        const { password: _pw, authUid: _au, ...updatesClean } = updates;
        Object.assign(currentUser, updatesClean);
        document.getElementById('sidebar-username').textContent = name;
      }
      showToast('✅ משתמש עודכן','success');
    } else {
      // ── Create new ──
      // First: create Firebase Auth account via REST API (doesn't affect current session)
      let authUid = null;
      try {
        authUid = await _createAuthUser(email, pass);
      } catch (authCreateErr) {
        if (authCreateErr.code === 'EMAIL_EXISTS') {
          showToast('אימייל זה כבר קיים ב-Firebase Auth','error'); return;
        }
        // Firebase Auth creation failed — fall back to DB-only (will migrate on first login)
        console.warn('Firebase Auth user creation failed, falling back to DB-only:', authCreateErr);
      }

      const newProfile = {
        displayName: name, email, role,
        isActive: true, createdAt: Date.now(), createdBy: currentUser.uid
      };
      if (authUid) {
        newProfile.authUid = authUid; // linked to Firebase Auth — no password stored
      } else {
        newProfile.password = await hashPassword(pass); // fallback until migration
      }

      const ref = await db.ref('users').push(newProfile);
      allOperators[ref.key] = { ...newProfile };
      showToast('✅ משתמש נוצר בהצלחה','success');
    }
    closeModal('modal-user');
    renderAdminUsersPage();
  } catch(e) {
    console.error(e);
    showToast('שגיאה בשמירה: ' + (e.message || e), 'error');
  }
}

async function deleteUser(uid) {
  const p = allOperators[uid];
  if (!p) return;

  // Prevent deleting yourself
  if (uid === currentUser.uid) { showToast('לא ניתן למחוק את המשתמש המחובר','error'); return; }

  // Check for any activity: donations or attendance
  const [donSnap, attSnap, absSnap] = await Promise.all([
    db.ref('donations').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref('attendance').orderByChild('operatorId').equalTo(uid).once('value'),
    db.ref('absences').orderByChild('operatorId').equalTo(uid).once('value'),
  ]);

  const hasDonations = !!donSnap.val();
  const hasAttendance = !!attSnap.val();
  const hasAbsences = !!absSnap.val();

  if (hasDonations || hasAttendance || hasAbsences) {
    const details = [
      hasDonations ? 'תרומות' : '',
      hasAttendance ? 'רשומות נוכחות' : '',
      hasAbsences ? 'היעדרויות' : '',
    ].filter(Boolean).join(', ');
    showToast(`לא ניתן למחוק – למשתמש יש ${details} במערכת`, 'error');
    return;
  }

  if (!confirm(`למחוק לצמיתות את ${p.displayName}?`)) return;

  await db.ref('users/'+uid).remove();
  delete allOperators[uid];
  showToast('משתמש נמחק','success');
  renderAdminUsersPage();
}

async function bulkReclassifyShimur() {
  const shimurIds = new Set(Object.entries(allCampaigns).filter(([,c])=>c.isShimur).map(([id])=>id));
  if (!shimurIds.size) { showToast('אין קמפיינים מסומנים כשימור','error'); return; }
  if (!confirm(`יעודכנו כל התרומות של ${shimurIds.size} קמפיין/י שימור לסוג "שימור". להמשיך?`)) return;
  const snap = await db.ref('donations').once('value');
  const updates = {};
  snap.forEach(child => {
    const r = child.val();
    if (shimurIds.has(r.campaignId) && r.donorType !== 'shimur') {
      updates[child.key+'/donorType'] = 'shimur';
    }
  });
  const count = Object.keys(updates).length;
  if (!count) { showToast('כל התרומות כבר מסווגות נכון','success'); return; }
  await db.ref('donations').update(updates);
  showToast(`✅ עודכנו ${count} תרומות לסוג שימור`,'success');
}

async function loadHorkTargetForModal(uid, month) {
  const snap = await db.ref(`settings/horkyTargets/${uid}/${month.replace('-','_')}`).once('value');
  const existing = snap.val();
  const info = document.getElementById('hork-target-current-info');

  if (existing && existing.target != null) {
    document.getElementById('hork-target-value').value = existing.target;

function _addMonths(monthStr, n) {
  const d = new Date(monthStr + '-01');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().slice(0, 7);
}
function _commRate(donorType) { return donorType === 'new' ? 0.05 : 0.025; }
function _commRateLabel(donorType) { return donorType === 'new' ? '5%' : '2.5%'; }
function _commAmt(r) { return (r.totalAmount || 0) * _commRate(r.donorType); }

async function loadCommissionReport() {

  const relevant = _commAllDonations.filter(r => r.rewardMonth === month);

  if (!relevant.length) {
    tableEl.innerHTML = `<div class="empty-state"><div class="empty-icon">💰</div><h3>אין עמלות ל-${monthLabel(month)}</h3><p>ייבא דוח גביה או הוסף תרומות חד-פעמיות בחודש זה</p></div>`;

    </div>

async function runBillingImport() {
  const donCol   = document.getElementById('col-donation-num')?.value;
  const mode     = document.getElementById('col-mode')?.value;
  const countCol = document.getElementById('col-payment-count')?.value;
  if (!donCol) { showToast('נא לבחור עמודת מספר תרומה','error'); return; }
  if (mode === 'per-donation' && !countCol) { showToast('נא לבחור עמודת כמות תשלומים','error'); return; }

  // Build map: donationNumber → paymentCount from billing file
  const billingMap = {};
  _billingRows.forEach(row => {
    const num = String(row[donCol]||'').trim();
    if (!num) return;
    if (mode === 'per-payment') {
      billingMap[num] = (billingMap[num] || 0) + 1;
    } else {
      const cnt = parseInt(row[countCol], 10);
      if (!isNaN(cnt)) billingMap[num] = Math.max(billingMap[num]||0, cnt);
    }
  });

  const resultEl = document.getElementById('billing-import-result');
  resultEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">⏳ מעבד...</div>';

  // Load all donations
  const snap = await db.ref('donations').once('value');
  const allDon = [];
  snap.forEach(c => { const r = c.val(); r._id = c.key; allDon.push(r); });

  // Build donationNumber → donation map (handle duplicates – keep latest)
  const donByNum = {};
  allDon.forEach(r => {
    const num = String(r.donationNumber||'').trim();
    if (num) donByNum[num] = r;
  });

  const today = currentMonth();
  const updates = {};
  let cntUpdated = 0, cntSkipped = 0, cntHistorical = 0, cntPending = 0, cntNotFound = 0;

  Object.entries(billingMap).forEach(([num, billCount]) => {
    const don = donByNum[num];
    if (!don) { cntNotFound++; return; }
    // single-payment and shimur: rewardMonth set at creation time, billing import skips them
    if (don.paymentsCount <= 1 || don.donorType === 'shimur') return;

    // GUARD: never overwrite locked or paid records
    if (don.rewardMonthLocked || don.rewardPaid) { cntSkipped++; return; }

    if (billCount < 2) {
      // Not enough payments yet – clear/keep rewardMonth as null
      if (don.rewardMonth) {
        updates[don._id + '/rewardMonth'] = null;
        updates[don._id + '/billingPaymentsReceived'] = billCount;
        cntUpdated++;
      }
      return;
    }

    const base = { billingPaymentsReceived: billCount };
    if (billCount > 2) {
      // Historical: auto-set to donation.month+2 and lock
      const histMonth = _addMonths(don.month || don.donationDate?.slice(0,7) || today, 2);
      base.rewardMonth = histMonth;
      base.rewardPaid = true;
      base.rewardMonthLocked = true;
      base.rewardPaidAt = Date.now();
      base.rewardPaidBy = 'system-historical';
      cntHistorical++;
    } else {
      // Exactly 2 payments – pending manual approval in current month
      base.rewardMonth = today;
      cntPending++;
    }
    Object.entries(base).forEach(([k,v]) => { updates[don._id + '/' + k] = v; });
    cntUpdated++;
  });

  if (Object.keys(updates).length) {
    await db.ref('donations').update(updates);
  }

  // Save import history
  await db.ref('billingImports').push({
    uploadedAt: Date.now(),
    uploadedBy: currentUser.uid,
    uploaderName: userProfile.displayName || currentUser.uid,
    rowCount: _billingRows.length,
    matchedCount: cntUpdated,
    skippedCount: cntSkipped,
    mode,
    columnMapping: { donationNumberCol: donCol, paymentCountCol: countCol || null }
  });

  resultEl.innerHTML = `
    <div style="background:#E8F5E9;border:1px solid #C8E6C9;border-radius:10px;padding:16px">
      <h4 style="margin:0 0 8px;color:#2E7D32">✅ ייבוא הושלם</h4>
      <ul style="margin:0;padding-right:16px;font-size:14px;line-height:1.8">
        <li>שורות בקובץ: <strong>${_billingRows.length}</strong></li>
        <li>תרומות עודכנו: <strong>${cntUpdated}</strong></li>
        <li>היסטוריות (סומנו כשולם אוטומטית): <strong>${cntHistorical}</strong></li>
        <li>ממתינות לאישור (2 תשלומים בדיוק): <strong>${cntPending}</strong></li>
        <li>דולגו (כבר נעולות/שולמו): <strong>${cntSkipped}</strong></li>
        <li>לא נמצאו במערכת: <strong>${cntNotFound}</strong></li>
      </ul>
      ${cntPending ? `<p style="margin:8px 0 0;color:#E65100;font-size:13px">⚠️ יש ${cntPending} תרומות הממתינות לאישורך בלשונית "אישור עמלות"</p>` : ''}
    </div>`;
  loadBillingImportHistory();
}

async function loadBillingImportHistory() {
  const histEl = document.getElementById('billing-import-history');
  if (!histEl) return;
  const snap = await db.ref('billingImports').orderByChild('uploadedAt').limitToLast(10).once('value');
  const items = [];
  snap.forEach(c => { const v = c.val(); v._id = c.key; items.push(v); });
  if (!items.length) { histEl.innerHTML = ''; return; }
  items.reverse();
  const rows = items.map(i => `<tr>
    <td>${new Date(i.uploadedAt||0).toLocaleString('he-IL')}</td>
    <td>${esc(i.uploaderName||i.uploadedBy||'')}</td>
    <td>${i.rowCount||0}</td>
    <td>${i.matchedCount||0}</td>
    <td>${i.skippedCount||0}</td>
  </tr>`).join('');
  histEl.innerHTML = `
    <h4>היסטוריית ייבואים</h4>
    <div class="table-responsive">
      <table class="data-table" style="font-size:13px">
        <thead><tr><th>תאריך</th><th>מייבא</th><th>שורות</th><th>עודכנו</th><th>דולגו</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function loadCommissionApproval() {
  const el = document.getElementById('ctab-content');
  if (!el) return;

  const snap = await db.ref('donations').once('value');
  const all = [];
  snap.forEach(c => { const r = c.val(); r._id = c.key; all.push(r); });

  const pending = all.filter(r => r.rewardMonth && !r.rewardPaid && !r.rewardMonthLocked);
  const paid    = all.filter(r => r.rewardPaid);

  let pendingRows = '';
  pending.sort((a,b) => (a.rewardMonth||'').localeCompare(b.rewardMonth||'')).forEach(r => {
    const comm = _commAmt(r);
    const typeLabel = r.donorType==='new' ? '<span class="donor-new">חדש</span>' : r.donorType==='shimur' ? '<span class="donor-shimur">שימור</span>' : '<span class="donor-returning">חוזר</span>';
    pendingRows += `<tr>
      <td>${r.donationDate||''}</td>
      <td>${esc(r.donorName||'')}</td>
      <td>${esc(r.operatorName||'')}</td>
      <td>${typeLabel}</td>
      <td>${fmtCurrency(r.totalAmount||0)}</td>
      <td style="font-weight:600">${fmtCurrency(comm)}</td>
      <td>
        <span id="rmonth-display-${r._id}" style="font-size:13px">${r.rewardMonth||''}</span>
        <button class="btn btn-ghost btn-sm" onclick="openEditRewardMonth('${r._id}','${r.rewardMonth||''}')" style="margin-right:4px;padding:2px 6px;font-size:11px">✏️</button>
      </td>
      <td><button class="btn btn-success btn-sm" onclick="approveReward('${r._id}')">✅ אשר</button></td>
    </tr>`;
  });

  let paidRows = '';
  paid.sort((a,b) => (b.rewardPaidAt||0)-(a.rewardPaidAt||0)).slice(0,50).forEach(r => {
    const comm = _commAmt(r);
    const typeLabel = r.donorType==='new' ? '<span class="donor-new">חדש</span>' : r.donorType==='shimur' ? '<span class="donor-shimur">שימור</span>' : '<span class="donor-returning">חוזר</span>';
    const paidBy = r.rewardPaidBy === 'system-historical' ? 'אוטומטי (היסטורי)' : (r.rewardPaidBy ? 'מנהל' : '');
    paidRows += `<tr>
      <td>${r.donationDate||''}</td>
      <td>${esc(r.donorName||'')}</td>
      <td>${esc(r.operatorName||'')}</td>
      <td>${typeLabel}</td>
      <td>${fmtCurrency(r.totalAmount||0)}</td>
      <td style="font-weight:600">${fmtCurrency(comm)}</td>
      <td>${r.rewardMonth||''}</td>
      <td><span class="reward-badge reward-paid">✅ שולם</span> <small style="color:var(--muted)">${paidBy}</small></td>
    </tr>`;
  });

  el.innerHTML = `
    <div class="comm-section">
      <h3 style="margin-top:0;color:var(--warning)">⏳ ממתינות לאישור (${pending.length})</h3>
      ${pending.length ? `
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>תאריך תרומה</th><th>תורם</th><th>טלפנית</th><th>סוג</th><th>סכום</th><th>עמלה</th><th>חודש עמלה</th><th>פעולה</th></tr></thead>
          <tbody>${pendingRows}</tbody>
        </table>
      </div>` : `<p style="color:var(--muted)">אין עמלות הממתינות לאישור</p>`}

      <h3 style="margin-top:28px;color:var(--success)">✅ שולם (${paid.length > 50 ? '50 אחרונות' : paid.length})</h3>
      ${paid.length ? `
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>תאריך תרומה</th><th>תורם</th><th>טלפנית</th><th>סוג</th><th>סכום</th><th>עמלה</th><th>חודש עמלה</th><th>סטטוס</th></tr></thead>
          <tbody>${paidRows}</tbody>
        </table>
      </div>` : `<p style="color:var(--muted)">אין עמלות ששולמו עדיין</p>`}
    </div>`;
}

async function approveReward(donationId) {
  if (!confirm('לאשר תשלום עמלה זו?')) return;
  await db.ref('donations/' + donationId).update({
    rewardPaid: true,
    rewardPaidAt: Date.now(),
    rewardPaidBy: currentUser.uid,
    rewardMonthLocked: true
  });
  showToast('✅ עמלה אושרה ונעולה','success');
  loadCommissionApproval();
}

function openEditRewardMonth(donationId, current) {
  const newMonth = prompt('שנה חודש עמלה (פורמט YYYY-MM):', current || currentMonth());
  if (!newMonth) return;
  if (!/^\d{4}-\d{2}$/.test(newMonth)) { showToast('פורמט לא תקין. השתמש ב-YYYY-MM','error'); return; }
  saveRewardMonth(donationId, newMonth);
}

async function saveRewardMonth(donationId, month) {
  // Safety: never overwrite a locked record
  const snap = await db.ref('donations/' + donationId).once('value');
  const don = snap.val();
  if (don?.rewardMonthLocked || don?.rewardPaid) {
    showToast('לא ניתן לשנות – תרומה זו כבר נעולה/שולמה','error');
    return;
  }
  await db.ref('donations/' + donationId + '/rewardMonth').set(month);
  showToast('✅ חודש עמלה עודכן','success');
  const display = document.getElementById('rmonth-display-' + donationId);
  if (display) display.textContent = month;
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
});

// Enter key on login
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
